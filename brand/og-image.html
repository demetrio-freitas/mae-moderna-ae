<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OG Image — MAE</title>
  <link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Raleway:wght@200;300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #888; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; }
    .og {
      width: 1200px;
      height: 630px;
      background: #e8e6e3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .og-logo {
      font-family: 'Tenor Sans', sans-serif;
      font-size: 120px;
      color: #0a1525;
      letter-spacing: 24px;
    }
    .og-line {
      width: 250px;
      height: 2px;
      background: #a9754d;
      margin: 28px 0;
    }
    .og-desc {
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      font-size: 16px;
      color: #0a1525;
      letter-spacing: 6px;
      text-transform: uppercase;
      opacity: 0.6;
    }
    .og-slogan {
      font-family: 'Raleway', sans-serif;
      font-weight: 200;
      font-size: 22px;
      color: #0a1525;
      margin-top: 40px;
      opacity: 0.5;
    }
    .og-slogan em {
      font-style: normal;
      color: #a9754d;
      opacity: 1;
    }
    .og-corner-tl, .og-corner-br {
      position: absolute;
      width: 80px;
      height: 80px;
      border: 1px solid #a9754d;
      opacity: 0.2;
    }
    .og-corner-tl { top: 40px; left: 40px; border-right: none; border-bottom: none; }
    .og-corner-br { bottom: 40px; right: 40px; border-left: none; border-top: none; }
    .info {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
  <div>
    <div class="og">
      <div class="og-corner-tl"></div>
      <div class="og-corner-br"></div>
      <div class="og-logo">MAE</div>
      <div class="og-line"></div>
      <div class="og-desc">Moderna Arquitetura e Engenharia</div>
      <div class="og-slogan">Pequenos espacos, <em>grandes transformacoes.</em></div>
    </div>
    <div class="info">Open Graph Image — 1200x630px — Screenshot para usar como og:image</div>
  </div>
</body>
</html>
