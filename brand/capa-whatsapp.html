<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Capa WhatsApp Business — MAE</title>
  <link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Raleway:wght@200;300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #888; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; }
    .capa {
      width: 1125px;
      height: 337px;
      background: #0a1525;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .capa-content {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .capa-logo {
      font-family: 'Tenor Sans', sans-serif;
      font-size: 72px;
      color: #e8e6e3;
      letter-spacing: 14px;
    }
    .capa-line {
      width: 160px;
      height: 2px;
      background: #a9754d;
      margin: 16px 0;
    }
    .capa-desc {
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      font-size: 11px;
      color: #d9d9d9;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.6;
    }
    .capa-slogan {
      font-family: 'Raleway', sans-serif;
      font-weight: 200;
      font-size: 15px;
      color: #d9d9d9;
      margin-top: 24px;
      opacity: 0.4;
    }
    .capa-slogan em {
      font-style: normal;
      color: #a9754d;
      opacity: 1;
    }
    /* Detalhe decorativo sutil */
    .deco-left, .deco-right {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 1px;
      height: 100px;
      background: #a9754d;
      opacity: 0.15;
    }
    .deco-left { left: 60px; }
    .deco-right { right: 60px; }

    .info {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
  <div>
    <div class="capa">
      <div class="deco-left"></div>
      <div class="deco-right"></div>
      <div class="capa-content">
        <div class="capa-logo">MAE</div>
        <div class="capa-line"></div>
        <div class="capa-desc">Moderna Arquitetura e Engenharia</div>
        <div class="capa-slogan">Pequenos espacos, <em>grandes transformacoes.</em></div>
      </div>
    </div>
    <div class="info">Capa WhatsApp Business — 1125x337px — Screenshot para usar</div>
  </div>
</body>
</html>
